name: Terraform Plan

# PR 作成・更新時に terraform plan を実行し、変更内容を PR コメントに投稿する
on:
  pull_request:
    paths:
      - "terraform/**"

env:
  AWS_REGION: ap-northeast-1

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write  # PR コメント投稿に必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        env:
          TF_VAR_db_password:                ${{ secrets.TF_DB_PASSWORD }}
          TF_VAR_order_service_image:        "placeholder"
          TF_VAR_notification_service_image: "placeholder"
        run: terraform plan -no-color 2>&1 | tee plan_output.txt
        continue-on-error: true

      # Plan 結果を PR コメントとして投稿
      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... (出力が長いため省略)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
            });

      - name: Check plan result
        if: steps.plan.outcome == 'failure'
        run: exit 1
