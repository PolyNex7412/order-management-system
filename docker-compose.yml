version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: order-db
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d orderdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build: ./services/order-service
    container_name: order-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orderdb
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: apppassword
      NOTIFICATION_SERVICE_URL: http://notification-service:8081
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=orderdb;Username=appuser;Password=apppassword"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
